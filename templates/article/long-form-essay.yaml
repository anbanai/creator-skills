name: long-form-essay
category: article
description: |
  深度长文模板——理性分析、文化评论、哲学思考、观点输出。
  封面统领全文基调，每个二级章节配一张全幅图作为视觉锚点。
  章节内可选细节图（比喻/案例特写）。结尾可选 CTA 或作者卡片。
article_types: [essay, commentary, analysis, opinion]
best_for:
  - 深度观点文（1500-3000 字）
  - 文化/哲学/社会评论
  - 行业分析、概念科普
rhythm:
  hero: required
  section_opener: required
  inline_detail: optional
  footer: optional
image_count:
  min: 4
  max: 6
section_image_size: full-width
modules:
  preferred: [hero, quote, callout, summary]
  forbidden: []
pairs_well_with: [quote, callout]
composition_guidance:
  - 开篇用 中心聚焦 或 留白主导，建立基调
  - 中段交替使用 三分法 / 前景背景 / 特写，避免连续雷同
  - 结尾用 留白主导 或 重复图案，收束情绪
  - 每张图必须有具体视觉主体（不允许多个抽象概念堆叠）
vision_verification:
  required: true
  strictness: high
  must_match_fields: [visual_brief, required_entities]
slot_strategy: |
  1. hero slot：封面图（步骤 6d 生成），2.35:1，作为开篇视觉
  2. section_opener slots：每个 ## 一张，16:9 全幅，紧跟章节标题之后
  3. inline_detail slot（可选）：章节内 1-2 张细节图，置于关键比喻/案例段落之后
  4. footer slot（可选）：作者卡片或 CTA，不带图或带小图
example_layout_plan: |
  {
    "article_type": "long-form-essay",
    "template_name": "long-form-essay",
    "slots": [
      { "slot_id": "hero", "section_index": 0, "image_url": "<cover_cdn>", "image_size": "full-bleed", "module": "hero" },
      { "slot_id": "section_opener", "section_index": 1, "image_url": "<img_01_cdn>", "image_size": "full-width", "module": null },
      { "slot_id": "section_opener", "section_index": 2, "image_url": "<img_02_cdn>", "image_size": "full-width", "module": "quote" },
      { "slot_id": "section_opener", "section_index": 3, "image_url": "<img_03_cdn>", "image_size": "full-width", "module": null },
      { "slot_id": "footer", "section_index": -1, "image_url": null, "module": "cta" }
    ]
  }
