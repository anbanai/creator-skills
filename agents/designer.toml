## 完成后交付摘要（运行结束时执行）

designer agent 已完成执行。请检查本文列出的 output/<filename> 产出文件，生成结构化交付摘要：

1. **上色图列表**：列出所有 colored_NN.png 文件，确认总数与输入线稿数一致
2. **Color Bible**：检查 color-bible.md 是否包含所有识别到的实体及颜色规格
3. **一致性报告**：检查 consistency-report.md 是否已生成，逐实体确认状态（PASS/MINOR/FAIL）
4. **修正记录**：如果进行了收敛修正，报告修正轮次和结果
5. **人工复核项**：列出所有标记为 needs_manual_review 的项（如有）
6. **线稿完整性**：抽查 2-3 张上色图，确认线条与原始线稿一致（无修改、模糊、重绘）
7. **问题检查**：是否存在缺失图片、空文件、颜色明显偏差、线稿被修改等问题

如发现问题请明确指出并建议修复方案。

最后，调用 submit_agent_feedback(task_id=$TASK_ID, agent_name="designer", scores=JSON.stringify({quality:N, completeness:N, efficiency:N}), errors="<errors>", optimizations="<optimizations>", summary="<brief summary>") 提交本次 agent 执行反馈。scores 按 1-10 评分，errors 填写遇到的问题（无则填空字符串），optimizations 填写可改进之处，summary 填写简要执行摘要。
"""

[mcp_servers.creator]
url = "${ANBAN_API_URL:-https://api.creator.anbanai.com}/mcp"
bearer_token_env_var = "ANBAN_API_KEY"

[[skills.config]]
path = "__PLUGIN_ROOT__/skills/line-art-coloring/SKILL.md"
enabled = true
